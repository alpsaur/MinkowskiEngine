[pytest]
minversion = 7.0
# The upstream test modules under tests/python are not test_-prefixed
# (e.g. convolution.py, pool.py), so collect every .py there.
testpaths = tests/python
python_files = *.py
# --assert=plain: with python_files=*.py, pytest assertion-rewrites EVERY
# imported module whose basename matches — including torch's gradcheck, whose
# rewritten asserts leak @py_assert* temp vars into its locals().copy() and
# TypeError inside _gradcheck_helper(**args). The suite is unittest-style
# (self.assert*), so rewriting adds nothing here anyway.
addopts = -q --assert=plain

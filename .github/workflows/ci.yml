name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      run_gpu:
        description: "Run the self-hosted GPU job (requires a GPU runner)"
        type: boolean
        default: false

# Two jobs:
#   cpu-build-test — runs on free GitHub-hosted runners (NO NVIDIA GPU, NO nvcc).
#     Validates the CPU-only build + packaging + import + CPU test suite ONLY.
#   gpu-test — OPTIONAL; needs a self-hosted GPU runner (e.g. an RTX 5090 box
#     with the CUDA 12.8 toolkit). Disabled by default; run via workflow_dispatch.
permissions:
  contents: read

jobs:
  cpu-build-test:
    name: CPU build & test (py${{ matrix.python }}, torch ${{ matrix.torch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
        torch: ["2.7.0", "2.9.0"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev libopenblas-dev ninja-build
      - name: Install PyTorch (CPU) + test deps
        run: |
          python -m pip install --upgrade pip
          pip install "torch~=${{ matrix.torch }}" --index-url https://download.pytorch.org/whl/cpu
          # numpy is a runtime requirement (requirements.txt: numpy>=1.21).
          # Install it separately so torch stays on the CPU wheel index above
          # rather than being pulled from PyPI as a CUDA build.
          pip install "numpy>=1.21" pytest
      # GitHub-hosted ubuntu runners have NO NVIDIA GPU and NO nvcc, so this
      # validates the CPU-only build + packaging + import + CPU tests ONLY.
      - name: Build CPU-only extension (in-place)
        env:
          CPU_ONLY: "1"
        run: |
          mkdir -p MinkowskiEngineBackend
          python setup.py build_ext --inplace --cpu_only
      - name: Run CPU tests
        # Bare `pytest` honors pytest.ini (testpaths = tests/python), which
        # deliberately excludes tests/cpp (C++ harness that errors without a
        # CXX env var). Do not pass an explicit path here.
        run: pytest -q

  gpu-test:
    name: GPU build & smoke (self-hosted, CUDA 12.8 / sm_120)
    # Needs a self-hosted GPU runner (e.g. an RTX 5090 box). Off by default.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_gpu }}
    runs-on: [self-hosted, linux, gpu]
    env:
      CUDA_HOME: /usr/local/cuda-12.8
      FORCE_CUDA: "1"
      TORCH_CUDA_ARCH_LIST: "12.0+PTX"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Put nvcc on PATH
        run: echo "$CUDA_HOME/bin" >> "$GITHUB_PATH"
      - name: Install PyTorch (cu128) + pytest
        run: |
          python -m pip install --upgrade pip
          pip install "torch~=2.9.0" --index-url https://download.pytorch.org/whl/cu128
          pip install pytest
      - name: Build CUDA extension (Blackwell sm_120)
        run: pip install . --no-build-isolation
      - name: GPU smoke test (sparse conv fwd/bwd on cuda)
        run: |
          python - <<'PY'
          import torch, MinkowskiEngine as ME
          d = "cuda"
          coords = torch.randint(0, 48, (2000, 4), dtype=torch.int32)
          coords = ME.utils.sparse_quantize(coords)
          feats = torch.randn(coords.shape[0], 8, device=d, requires_grad=True)
          x = ME.SparseTensor(feats, coordinates=coords, device=d)
          conv = ME.MinkowskiConvolution(8, 16, kernel_size=3, stride=1, dimension=3).to(d)
          out = conv(x); out.F.sum().backward()
          assert out.F.device.type == "cuda" and feats.grad is not None
          print("GPU smoke OK:", torch.cuda.get_device_name(0), torch.cuda.get_device_capability(0))
          PY
